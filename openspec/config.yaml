schema: spec-driven

context: |
  Tech stack: Python 3.11+, MiniCPM-o 4.5, OpenBMB Cloud API, LanceDB, WebSocket
  Framework: Superpowers + OpenSpec + CCPM + CI (four-layer development framework)
  Domain: ADHD children cognitive training device
  Regulatory: 《人工智能拟人化互动服务管理暂行办法》(effective 2026-07-15)

rules:
  proposal:
    - Must reference corresponding GitHub Issue
    - Must include acceptance criteria
    - All artifacts MUST be written in Chinese (proposal, design, specs, tasks)
  tasks:
    - Must follow TDD order (test before implementation)
    - Each task must be independently verifiable
  specs:
    - Each requirement body must contain keyword "MUST" or "SHALL"
    - Each requirement must have at least one "#### Scenario:" block with WHEN/THEN
  language:
    - All OpenSpec artifacts use Chinese (中文)
